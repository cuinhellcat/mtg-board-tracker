<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Board State Tracker - New Game</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .setup-container {
            width: 100%;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .setup-header {
            text-align: center;
        }

        .setup-header h1 {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .setup-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .setup-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .setup-card h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
        }

        .form-group textarea {
            width: 100%;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.4;
        }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .form-row > * {
            flex: 1;
        }

        /* Scryfall Status */
        .scryfall-status {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .scryfall-info {
            flex: 1;
            font-size: 13px;
            min-width: 200px;
        }

        .scryfall-info.cached {
            color: var(--success);
        }

        .scryfall-info.not-cached {
            color: var(--warning);
        }

        .scryfall-progress {
            width: 100%;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
            display: none;
        }

        .scryfall-progress.visible {
            display: block;
        }

        .progress-bar-track {
            width: 100%;
            height: 6px;
            background: var(--bg-card);
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
            animation: progressPulse 1.5s ease-in-out infinite;
        }

        @keyframes progressPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Deck Upload */
        .deck-upload-area {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .file-upload-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            background: var(--bg-card);
            border: 1px dashed var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .file-upload-label:hover {
            background: var(--bg-card-hover);
            border-color: var(--text-muted);
        }

        .file-upload-label input[type="file"] {
            display: none;
        }

        .deck-result {
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
            display: none;
        }

        .deck-result.visible {
            display: block;
        }

        .deck-result.success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: var(--success);
        }

        .deck-result.error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: var(--error);
        }

        .deck-result .warnings {
            color: var(--warning);
            margin-top: 4px;
            font-size: 12px;
        }

        /* Game Settings */
        .radio-group {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* Coin Flip */
        .coin-flip-btn {
            position: relative;
        }

        .coin-flip-btn.flipping {
            pointer-events: none;
        }

        @keyframes coinSpin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(1080deg); }
        }

        .coin-result {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            margin-left: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .coin-result.visible {
            opacity: 1;
        }

        /* Start Game */
        .start-game-section {
            text-align: center;
        }

        .start-game-btn {
            font-size: 18px;
            padding: 14px 40px;
            border-radius: 10px;
        }

        .start-error {
            color: var(--error);
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .start-error.visible {
            display: block;
        }

        /* Saved Decks */
        .saved-deck-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }

        .saved-deck-row select {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 6px 10px;
            font-size: 13px;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .saved-deck-row .btn-small {
            white-space: nowrap;
        }

        /* Commander select */
        .commander-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        .commander-row select {
            flex: 1;
            padding: 6px 10px;
            font-size: 13px;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        /* Save deck row */
        .save-deck-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
        }

        .save-deck-row input {
            flex: 1;
        }

        .post-parse-section {
            display: none;
        }

        .post-parse-section.visible {
            display: block;
        }

        .btn-danger {
            background: var(--error);
            color: #fff;
        }

        .btn-danger:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // ================================================================
        // Format Selection & Life Persistence
        // ================================================================
        const formatRadios = document.querySelectorAll('input[name="game-format"]');
        const startingLifeInput = document.getElementById('starting-life');

        function getSelectedFormat() {
            const checked = document.querySelector('input[name="game-format"]:checked');
            return checked ? checked.value : 'Commander';
        }

        function getStorageKey(format) {
            return `setup-life-${format}`;
        }

        function getDefaultLife(format) {
            return format === 'Tiny Leaders' ? 25 : 40;
        }

        function loadStartingLife(format) {
            const saved = localStorage.getItem(getStorageKey(format));
            if (saved) {
                startingLifeInput.value = saved;
            } else {
                startingLifeInput.value = getDefaultLife(format);
            }
        }

        // Initialize life based on default selected format
        loadStartingLife(getSelectedFormat());

        // Save life value on input
        startingLifeInput.addEventListener('input', () => {
            const format = getSelectedFormat();
            localStorage.setItem(getStorageKey(format), startingLifeInput.value);
        });

        formatRadios.forEach(radio => {
            radio.addEventListener('change', () => {
                const newFormat = radio.value;
                console.log('Format changed to:', newFormat);

                // Adjust starting life to saved value or default for the new format
                loadStartingLife(newFormat);
                
                // Explicitly reload decks for the new format
                refreshSavedDecks();
                
                // Reset parsed state as deck requirements (like size) might conceptually change
                PLAYER_NUMS.forEach(function (pn) {
                    document.getElementById('p' + pn + '-deck').value = '';
                    document.getElementById('p' + pn + '-result').classList.remove('visible');
                    document.getElementById('p' + pn + '-post-parse').classList.remove('visible');
                    deckParsed[pn] = false;
                });
                updateStartButton();
            });
        });

        // ---- State ----
        const PLAYER_NUMS = [1, 2, 3, 4];
        let scryfallReady = false;
        const deckParsed = { 1: false, 2: false, 3: false, 4: false };
        const deckData = { 1: null, 2: null, 3: null, 4: null };

        // ---- DOM refs ----
        const scryfallInfoEl = document.getElementById('scryfall-info');
        const scryfallBtn = document.getElementById('scryfall-btn');
        const scryfallProgress = document.getElementById('scryfall-progress');
        const scryfallProgressText = document.getElementById('scryfall-progress-text');
        const scryfallProgressBar = document.getElementById('scryfall-progress-bar');
        const startBtn = document.getElementById('start-game-btn');
        const startError = document.getElementById('start-error');

        // ---- Sync player names with radio labels ----
        const nameInputs = {};
        PLAYER_NUMS.forEach(function (pn) {
            const input = document.getElementById('p' + pn + '-name');
            const label = document.getElementById('radio-p' + pn + '-label');
            nameInputs[pn] = input;
            const sync = function () { label.textContent = input.value || ('Player ' + pn); };
            input.addEventListener('input', sync);
            sync();  // initial
        });

        // ================================================================
        // Scryfall Status
        // ================================================================

        function checkScryfallStatus() {
            fetch('/api/scryfall/status')
                .then(res => res.json())
                .then(data => {
                    if (data.cached) {
                        scryfallReady = true;
                        scryfallInfoEl.className = 'scryfall-info cached';
                        const count = data.count ? data.count.toLocaleString() : '?';
                        const date = data.last_updated || 'Unknown';
                        scryfallInfoEl.textContent = 'Card database: ' + count + ' cards (last updated: ' + date + ')';
                        scryfallBtn.textContent = 'Update';
                        scryfallBtn.style.display = '';
                        updateStartButton();
                    } else {
                        scryfallReady = false;
                        scryfallInfoEl.className = 'scryfall-info not-cached';
                        scryfallInfoEl.textContent = 'Card database not found.';
                        scryfallBtn.textContent = 'Download Now';
                        scryfallBtn.style.display = '';
                        updateStartButton();
                    }
                })
                .catch(err => {
                    scryfallInfoEl.textContent = 'Could not check card database status.';
                    scryfallInfoEl.className = 'scryfall-info not-cached';
                    console.error('Scryfall status check failed:', err);
                });
        }

        scryfallBtn.addEventListener('click', () => {
            scryfallBtn.disabled = true;
            scryfallProgress.classList.add('visible');
            scryfallProgressText.textContent = 'Downloading card database...';
            scryfallProgressBar.style.width = '10%';

            fetch('/api/scryfall/download', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        scryfallProgressBar.style.width = '100%';
                        scryfallProgressText.textContent = 'Download complete!';
                        scryfallReady = true;
                        setTimeout(() => {
                            scryfallProgress.classList.remove('visible');
                            checkScryfallStatus();
                        }, 1500);
                    } else {
                        scryfallProgressText.textContent = 'Download failed: ' + (data.error || 'Unknown error');
                        scryfallProgressBar.style.width = '0%';
                        scryfallBtn.disabled = false;
                    }
                })
                .catch(err => {
                    scryfallProgressText.textContent = 'Download failed. Check connection.';
                    scryfallProgressBar.style.width = '0%';
                    scryfallBtn.disabled = false;
                    console.error('Scryfall download failed:', err);
                });

            // Simulate progress while waiting
            let progress = 10;
            const progressInterval = setInterval(() => {
                if (progress < 85) {
                    progress += Math.random() * 8;
                    scryfallProgressBar.style.width = Math.min(progress, 85) + '%';
                } else {
                    clearInterval(progressInterval);
                }
            }, 500);
        });

        checkScryfallStatus();

        // ================================================================
        // Saved Decks
        // ================================================================

        function refreshSavedDecks() {
            var format = getSelectedFormat();
            console.log('Refreshing decks for format:', format);
            fetch('/api/decks/list?game_format=' + encodeURIComponent(format))
                .then(res => res.json())
                .then(data => {
                    var decks = data.decks || [];
                    console.log('Decks received:', decks.length);
                    PLAYER_NUMS.forEach(function (pn) {
                        var sel = document.getElementById('p' + pn + '-saved-decks');
                        var loadBtn = document.getElementById('p' + pn + '-load-btn');
                        var delBtn = document.getElementById('p' + pn + '-delete-btn');
                        
                        // Clear existing but keep placeholder
                        sel.innerHTML = '<option value="">-- select --</option>';
                        
                        decks.forEach(function (d) {
                            var cmdLabel = d.commander_names && d.commander_names.length ? d.commander_names.join(' + ') : (d.commander || '');
                            var label = d.name + ' (' + d.card_count + ' cards' + (cmdLabel ? ', ' + cmdLabel : '') + ')';
                            var opt = document.createElement('option');
                            opt.value = d.filename;
                            opt.textContent = label;
                            sel.appendChild(opt);
                        });
                        
                        loadBtn.disabled = true;
                        delBtn.disabled = true;
                    });
                })
                .catch(function (err) { console.error('Error refreshing decks:', err); });
        }

        PLAYER_NUMS.forEach(function (pn) {
            var sel = document.getElementById('p' + pn + '-saved-decks');
            var loadBtn = document.getElementById('p' + pn + '-load-btn');
            var delBtn = document.getElementById('p' + pn + '-delete-btn');

            sel.addEventListener('change', function () {
                loadBtn.disabled = !sel.value;
                delBtn.disabled = !sel.value;
            });

            loadBtn.addEventListener('click', function () {
                if (!sel.value) return;
                var format = getSelectedFormat();
                fetch('/api/decks/load?filename=' + encodeURIComponent(sel.value) + '&game_format=' + encodeURIComponent(format))
                    .then(function (res) { return res.json(); })
                    .then(function (data) {
                        if (!data.success) return;
                        var deck = data.deck;
                        document.getElementById('p' + pn + '-deck').value = deck.decklist_text || '';
                        // Auto-parse after loading (supports Partner)
                        var cmds = deck.commander_names || [];
                        if (!cmds.length && deck.commander_name) cmds = [deck.commander_name];
                        parseDeck(pn, cmds);
                    })
                    .catch(function (err) { console.error('Load deck failed:', err); });
            });

            delBtn.addEventListener('click', function () {
                if (!sel.value) return;
                var selText = sel.options[sel.selectedIndex].textContent;
                if (!confirm('Delete deck "' + selText + '"?')) return;
                var format = getSelectedFormat();
                fetch('/api/decks/' + encodeURIComponent(sel.value) + '?game_format=' + encodeURIComponent(format), { method: 'DELETE' })
                    .then(function (res) { return res.json(); })
                    .then(function () { refreshSavedDecks(); })
                    .catch(function (err) { console.error('Delete deck failed:', err); });
            });
        });

        refreshSavedDecks();

        // ================================================================
        // File Upload
        // ================================================================

        PLAYER_NUMS.forEach(function (pn) {
            document.getElementById('p' + pn + '-file').addEventListener('change', (e) => {
                handleFileUpload(e.target, document.getElementById('p' + pn + '-deck'));
            });
        });

        function handleFileUpload(fileInput, textarea) {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                textarea.value = e.target.result;
            };
            reader.onerror = () => {
                console.error('Failed to read file');
            };
            reader.readAsText(file);
        }

        // ================================================================
        // Parse Deck
        // ================================================================

        PLAYER_NUMS.forEach(function (pn) {
            document.getElementById('p' + pn + '-parse-btn').addEventListener('click', () => {
                parseDeck(pn);
            });
        });

        function parseDeck(playerNum, presetCommanders) {
            const deckText = document.getElementById('p' + playerNum + '-deck').value.trim();
            const resultEl = document.getElementById('p' + playerNum + '-result');

            if (!deckText) {
                showDeckResult(resultEl, 'error', 'Please enter or upload a decklist first.');
                return;
            }

            const parseBtn = document.getElementById('p' + playerNum + '-parse-btn');
            parseBtn.disabled = true;
            parseBtn.textContent = 'Parsing...';

            fetch('/api/deck/parse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ decklist: deckText })
            })
            .then(res => res.json())
            .then(data => {
                parseBtn.disabled = false;
                parseBtn.textContent = 'Parse Deck';

                if (data.success) {
                    // Use preset commanders (from saved deck) or parsed ones
                    var activeCommanders = presetCommanders || data.commander_names || [];
                    // Backwards compat: single string
                    if (!Array.isArray(activeCommanders)) {
                        activeCommanders = activeCommanders ? [activeCommanders] : [];
                    }
                    // Fallback to single commander field
                    if (!activeCommanders.length && data.commander) {
                        activeCommanders = [data.commander];
                    }

                    let msg = 'Deck loaded: ' + data.card_count + ' cards';
                    if (activeCommanders.length) {
                        msg += ' | Commander: ' + activeCommanders.join(' + ');
                    }

                    let warningsHtml = '';
                    if (data.warnings && data.warnings.length > 0) {
                        warningsHtml = '<div class="warnings">';
                        data.warnings.forEach(w => {
                            warningsHtml += '<div>Warning: ' + escapeHtml(w) + '</div>';
                        });
                        warningsHtml += '</div>';
                    }

                    showDeckResult(resultEl, 'success', msg, warningsHtml);

                    deckParsed[playerNum] = true;
                    deckData[playerNum] = data;
                    updateStartButton();

                    // Collect card names for commander dropdown
                    var names = data.card_names;
                    if (!names || !names.length) {
                        // Fallback: extract from parsed data
                        names = [];
                        var mainCards = (data.data && data.data.main) || [];
                        mainCards.forEach(function (c) {
                            if (c.name && names.indexOf(c.name) === -1) names.push(c.name);
                        });
                    }

                    // Show post-parse section (commander + partner + save)
                    showPostParse(playerNum, names, activeCommanders);
                } else {
                    showDeckResult(resultEl, 'error', 'Parse failed: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(err => {
                parseBtn.disabled = false;
                parseBtn.textContent = 'Parse Deck';
                showDeckResult(resultEl, 'error', 'Parse request failed. Is the server running?');
                console.error('Deck parse failed:', err);
            });
        }

        // ================================================================
        // Post-Parse: Commander Dropdown + Save Deck
        // ================================================================

        function showPostParse(playerNum, cardNames, activeCommanders) {
            // activeCommanders: array of commander names (supports Partner)
            if (!Array.isArray(activeCommanders)) {
                activeCommanders = activeCommanders ? [activeCommanders] : [];
            }
            var section = document.getElementById('p' + playerNum + '-post-parse');
            var cmdSelect = document.getElementById('p' + playerNum + '-commander');
            var partnerSelect = document.getElementById('p' + playerNum + '-partner');

            var sorted = cardNames.slice().sort();

            // Populate commander dropdown
            cmdSelect.innerHTML = '<option value="">-- none --</option>';
            sorted.forEach(function (name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (activeCommanders[0] && name === activeCommanders[0]) opt.selected = true;
                cmdSelect.appendChild(opt);
            });

            // Populate partner dropdown
            partnerSelect.innerHTML = '<option value="">-- none --</option>';
            sorted.forEach(function (name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (activeCommanders[1] && name === activeCommanders[1]) opt.selected = true;
                partnerSelect.appendChild(opt);
            });

            section.classList.add('visible');
        }

        // Save deck buttons
        PLAYER_NUMS.forEach(function (pn) {
            document.getElementById('p' + pn + '-save-btn').addEventListener('click', function () {
                var nameInput = document.getElementById('p' + pn + '-save-name');
                var deckName = nameInput.value.trim();
                if (!deckName) { alert('Please enter a deck name.'); return; }

                var deckText = document.getElementById('p' + pn + '-deck').value.trim();
                var cmdSelect = document.getElementById('p' + pn + '-commander');
                var partnerSelect = document.getElementById('p' + pn + '-partner');
                var commanderNames = [];
                if (cmdSelect.value) commanderNames.push(cmdSelect.value);
                if (partnerSelect.value) commanderNames.push(partnerSelect.value);
                var dData = deckData[pn];
                var cardCount = dData ? dData.card_count : 0;
                var format = getSelectedFormat();

                fetch('/api/decks/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: deckName,
                        decklist_text: deckText,
                        commander_names: commanderNames,
                        card_count: cardCount,
                        format: format
                    })
                })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    if (data.success) {
                        nameInput.value = '';
                        refreshSavedDecks();
                    } else {
                        alert('Save failed: ' + (data.error || 'Unknown'));
                    }
                })
                .catch(function (err) { alert('Save failed.'); console.error(err); });
            });
        });

        function showDeckResult(el, type, message, extraHtml) {
            el.className = 'deck-result visible ' + type;
            el.innerHTML = escapeHtml(message) + (extraHtml || '');
        }

        // ================================================================
        // Start Button State
        // ================================================================

        function updateStartButton() {
            const allParsed = PLAYER_NUMS.every(function (pn) { return deckParsed[pn]; });
            const ready = scryfallReady && allParsed;
            startBtn.disabled = !ready;

            if (!ready) {
                const reasons = [];
                if (!scryfallReady) reasons.push('card database not downloaded');
                PLAYER_NUMS.forEach(function (pn) {
                    if (!deckParsed[pn]) {
                        reasons.push((nameInputs[pn].value || ('Player ' + pn)) + ' deck not parsed');
                    }
                });
                startError.textContent = 'Required: ' + reasons.join(', ');
                startError.classList.add('visible');
            } else {
                startError.classList.remove('visible');
            }
        }

        updateStartButton();

        // ================================================================
        // Coin Flip
        // ================================================================

        document.getElementById('coin-flip-btn').addEventListener('click', () => {
            const btn = document.getElementById('coin-flip-btn');
            const resultEl = document.getElementById('coin-result');

            btn.classList.add('flipping');
            resultEl.classList.remove('visible');
            resultEl.textContent = '';

            // Helper: display name for a player index (0-based)
            const nameForIndex = (idx) => nameInputs[idx + 1].value || ('Player ' + (idx + 1));
            const numPlayers = PLAYER_NUMS.length;

            // Animate briefly then show result
            let flips = 0;
            const maxFlips = 12;
            const flipInterval = setInterval(() => {
                flips++;
                const tempWinner = Math.floor(Math.random() * numPlayers);
                resultEl.textContent = nameForIndex(tempWinner);
                resultEl.classList.add('visible');

                if (flips >= maxFlips) {
                    clearInterval(flipInterval);

                    // Final result
                    const winner = Math.floor(Math.random() * numPlayers);
                    resultEl.textContent = nameForIndex(winner) + ' goes first!';

                    // Select the radio button
                    const radios = document.querySelectorAll('input[name="first-player"]');
                    radios.forEach(r => {
                        r.checked = parseInt(r.value) === winner;
                    });

                    btn.classList.remove('flipping');
                }
            }, 120);
        });

        // ================================================================
        // Start Game
        // ================================================================

        startBtn.addEventListener('click', () => {
            if (startBtn.disabled) return;

            const firstPlayerRadio = document.querySelector('input[name="first-player"]:checked');
            const firstPlayer = firstPlayerRadio ? parseInt(firstPlayerRadio.value) : 0;

            // Get commander selections from dropdowns (supports Partner)
            function getCommanderNames(playerNum) {
                var names = [];
                var cmd = document.getElementById('p' + playerNum + '-commander').value;
                var partner = document.getElementById('p' + playerNum + '-partner').value;
                if (cmd) names.push(cmd);
                if (partner) names.push(partner);
                return names;
            }

            // Send already-parsed card data instead of raw text to avoid re-parsing
            const format = getSelectedFormat();
            const players = PLAYER_NUMS.map(function (pn) {
                const d = deckData[pn];
                return {
                    name: nameInputs[pn].value || ('Player ' + pn),
                    decklist: d && d.data ? d.data.main : document.getElementById('p' + pn + '-deck').value.trim(),
                    commander_names: getCommanderNames(pn)
                };
            });
            const playModeEl = document.querySelector('input[name="play-mode"]:checked');
            const payload = {
                players: players,
                starting_life: parseInt(document.getElementById('starting-life').value) || (format === 'Tiny Leaders' ? 25 : 40),
                first_player: firstPlayer,
                format: format,
                play_mode: playModeEl ? playModeEl.value : 'competitive'
            };

            startBtn.disabled = true;
            startBtn.textContent = 'Starting...';

            fetch('/api/game/new', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Open Command Center in a new window
                    window.open('/command', 'mtg-command');
                    // Navigate current tab to board
                    window.location.href = '/board';
                } else {
                    startBtn.disabled = false;
                    startBtn.textContent = 'Start Game';
                    startError.textContent = 'Failed to start game: ' + (data.error || 'Unknown error');
                    startError.classList.add('visible');
                }
            })
            .catch(err => {
                startBtn.disabled = false;
                startBtn.textContent = 'Start Game';
                startError.textContent = 'Failed to connect to server.';
                startError.classList.add('visible');
                console.error('Game start failed:', err);
            });
        });

        // ================================================================
        // Utility
        // ================================================================

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    });
    </script>
</body>
</html>
